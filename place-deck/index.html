<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>place deck - okitegami local</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="./place-deck.css">
</head>
<body>
  <header class="site-header minimal-header">
    <p class="label">okitegami local</p>
    <h1>place deck</h1>
    <p class="lead">行きたい店や場所をカード化して、必要なときだけルートを開く。これは路線検索ではなく、外へ出る前の判断画面。</p>
    <p class="back-link"><a href="../">← okitegami home</a></p>
  </header>

  <main>
    <section class="section-heading">
      <h2>行ける場所カード</h2>
      <p>画像・用途・向いている状態・移動技をまとめる。Google Maps は最後に開けばいい。</p>
    </section>

    <section class="place-grid" id="place-grid" aria-live="polite"></section>
  </main>

  <footer>
    <p class="back-link">画像は local 用の置き場。公開時は自分で撮った写真かプレースホルダー推奨。</p>
  </footer>

  <script src="./places.js"></script>
  <script src="./place-deck.js"></script>
</body>
</html>
