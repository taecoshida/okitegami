name: Update zaike feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update zaike feed
        timeout-minutes: 3
        run: python scripts/update_zaike_feed.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zaike-feed/data/feed.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update zaike feed data"
          git push
