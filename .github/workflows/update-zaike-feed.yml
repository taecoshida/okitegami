name: Update zaike feed

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zaike-feed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate updater syntax
        run: python -m py_compile scripts/update_zaike_feed.py

      - name: Update zaike feed
        timeout-minutes: 3
        run: python scripts/update_zaike_feed.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zaike-feed/data/feed.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update zaike feed data"
          git pull --rebase origin main
          git push origin HEAD:main
