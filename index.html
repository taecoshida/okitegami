<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okitegami</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive-top.css">
</head>
<body>
  <header class="site-header minimal-header">
    <p class="label mobile-context">small web shelf</p>
    <h1>okitegami</h1>
    <p class="lead mobile-context">
      画像と短い言葉を、流さずに置いておく場所。
    </p>
  </header>

  <main>
    <section class="okitegami-shelf" aria-labelledby="okitegami-title">
      <div class="section-heading mobile-context">
        <h2>置き手紙</h2>
        <p>
          今日の1枚、短い記録、あとで戻りたい言葉。
          ボタンでめくれる小さな棚です。
        </p>
      </div>
      <h2 id="okitegami-title" class="visually-hidden">置き手紙</h2>

      <section id="entries" class="entries single-entry" aria-label="entries">
        <p class="loading">置き手紙を読み込み中...</p>
      </section>

      <section class="toolbar quiet-toolbar" aria-label="display options">
        <p id="entry-count" class="entry-count">entries</p>
        <div class="pager" aria-label="entry navigation">
          <button id="prev-entry" type="button">前へ</button>
          <button id="next-entry" type="button">次へ</button>
        </div>
      </section>
    </section>

    <section class="portal-grid quiet-links" aria-label="zaike shelves">
      <a class="shelf-link" href="weblog/index.html">
        <span class="shelf-label">zaike weblog</span>
        <span class="shelf-text">生活の中で発生した観察を、少し長い文章として置いておく場所。</span>
      </a>

      <a class="shelf-link" href="recipe/index.html">
        <span class="shelf-label">zaike recipe</span>
        <span class="shelf-text">生活の中で再現できた手順を、あとで戻れる形で置いておく場所。</span>
      </a>
    </section>

    <!--
    <section class="intro">
      <h2>about</h2>
      <p>
        ここは、画像・短い言葉・生活の記録を、日付ごとの小さなカードとして置いていく場所です。
      </p>
    </section>
    -->
  </main>

  <footer>
    <p>okitegami / static web shelf</p>
  </footer>

  <script src="entries.js"></script>
  <script src="main.js"></script>
</body>
</html>
