<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okitegami</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <p class="label">small web shelf</p>
    <h1>okitegami</h1>
    <p class="lead">
      画像と短い言葉を、流さずに置いておく場所。
    </p>
  </header>

  <main>
    <section class="okitegami-shelf" aria-labelledby="okitegami-title">
      <div class="section-heading">
        <h2 id="okitegami-title">置き手紙</h2>
        <p>
          今日の1枚、短い記録、あとで戻りたい言葉。
          横に送って読める小さな棚です。
        </p>
      </div>

      <section class="toolbar" aria-label="display options">
        <p id="entry-count">entries</p>
        <button id="toggle-order" type="button">古い順にする</button>
      </section>

      <section id="entries" class="entries" aria-label="entries">
        <p class="loading">置き手紙を読み込み中...</p>
      </section>
    </section>

    <section class="portal-grid" aria-label="zaike shelves">
      <a class="shelf-link" href="weblog/index.html">
        <span class="shelf-label">zaike weblog</span>
        <span class="shelf-text">置き手紙より長い観察を置いています。</span>
      </a>

      <a class="shelf-link" href="recipe/index.html">
        <span class="shelf-label">zaike recipe</span>
        <span class="shelf-text">生活の中で再現できた手順を置いています。</span>
      </a>
    </section>

    <section class="intro">
      <h2>about</h2>
      <p>
        ここは、画像・短い言葉・生活の記録を、日付ごとの小さなカードとして置いていく場所です。
      </p>
    </section>
  </main>

  <footer>
    <p>okitegami / static web shelf</p>
  </footer>

  <script src="entries.js"></script>
  <script src="main.js"></script>
</body>
</html>
