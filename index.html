<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okitegami</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <p class="label">small web shelf</p>
    <h1>okitegami</h1>
    <p class="lead">
      画像と短い言葉を、流さずに置いておく場所。
    </p>
  </header>

  <main>
    <section class="intro">
      <h2>about</h2>
      <p>
        今日の1枚、短い記録、あとで戻りたい言葉。
        ここでは、それぞれを日付ごとの小さなカードとして置いていきます。
      </p>
    </section>

    <section class="shelf-link">
  <h2>weblog</h2>
  <p>
    置き手紙より長い観察は、<a href="weblog/index.html">zaike weblog</a> に置いています。
  </p>
　　</section>

    <section class="toolbar" aria-label="display options">
      <p id="entry-count">entries</p>
      <button id="toggle-order" type="button">古い順にする</button>
    </section>

    <section id="entries" class="entries" aria-label="entries">
      <p class="loading">置き手紙を読み込み中...</p>
    </section>
  </main>

  <footer>
    <p>okitegami / static web shelf</p>
  </footer>

  <script src="entries.js"></script>
  <script src="main.js"></script>
</body>
</html>
