<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイトル - zaike weblog</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="site-header">
    <p class="label">zaike weblog / YYYY.MM.DD</p>
    <h1>タイトル</h1>
    <p class="lead">
      リード文をここに入れる。
    </p>
    <p class="back-link"><a href="index.html">← weblog</a></p>
  </header>

  <main>
    <article class="longform">
      <!-- 画像がある場合だけ使う。画像がない場合は figure ごと削除してOK。 -->
      <figure class="article-hero">
        <img src="images/YYYY-MM-DD-slug.png" alt="タイトル">
        <figcaption>タイトル</figcaption>
      </figure>

      <p>本文をここに入れる。</p>

      <p>段落ごとに p タグで囲む。</p>

      <h2>必要なら小見出し</h2>

      <p>長くなっても、このHTMLファイルだけを編集すればよい。</p>
    </article>
  </main>

  <footer>
    <p>zaike weblog / static web shelf</p>
  </footer>
</body>
</html>
