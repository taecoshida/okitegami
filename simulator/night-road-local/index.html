<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Night Road Local</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">local pseudo-3D drive simulator</p>
        <h1>Night Road Local</h1>
      </div>
      <div class="hud-grid" aria-label="driving status">
        <div><span>SPEED</span><strong id="speedReadout">0</strong></div>
        <div><span>FUEL</span><strong id="fuelReadout">100</strong></div>
        <div><span>DIST</span><strong id="distanceReadout">0.0</strong></div>
        <div><span>SCENE</span><strong id="sceneReadout">CITY</strong></div>
      </div>
    </section>

    <section class="drive-panel">
      <canvas id="roadCanvas" width="960" height="540" aria-label="pseudo 3D night road"></canvas>
      <div class="scanline"></div>
      <div class="center-reticle"></div>
    </section>

    <section class="control-deck">
      <div class="avatar-card">
        <div id="avatarFace" class="avatar-face">😐</div>
        <div>
          <p class="eyebrow">driver</p>
          <h2 id="avatarMood">calm</h2>
          <p id="driverComment">Start engine. The road is waiting.</p>
        </div>
      </div>

      <div class="radio-card">
        <p class="eyebrow">radio log</p>
        <div id="radioLog" class="radio-log">[system] press START ENGINE to enable audio.</div>
      </div>

      <div class="button-card">
        <button id="startButton" type="button">START ENGINE</button>
        <button id="muteButton" type="button">MUTE</button>
        <button id="radioButton" type="button">RADIO</button>
      </div>
    </section>

    <section class="help-panel">
      <span>W / ↑ accelerate</span>
      <span>S / ↓ brake</span>
      <span>A,D / ←,→ steer</span>
      <span>Space stop event</span>
      <span>R radio</span>
      <span>M mute</span>
      <a href="../../index.html">back to okitegami</a>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
